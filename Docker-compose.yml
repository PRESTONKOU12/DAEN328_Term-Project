services:

  # ===========================================================================
  # POSTGRES — starts empty, ETL pipeline creates and populates all tables
  # ===========================================================================
  postgres:
    image: postgres:15
    container_name: movies_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432"                    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ===========================================================================
  # ETL — extract → transform → load, runs once then exits
  # ===========================================================================
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile.etl
    container_name: movies_etl
    env_file:
      - .env
    environment:
      DB_HOST:        postgres            # matches postgres service name above
      DB_PORT:        ${DB_PORT}
      DB_NAME:        ${DB_NAME}
      DB_USER:        ${DB_USER}
      DB_PASSWORD:    ${DB_PASSWORD}
      DATA_DIR:       /app/data
      GEOCODER_AGENT: movies_in_the_park_transform
      GEOCODER_DELAY: "1.0"
      API_ENDPOINTS:  ${API_ENDPOINTS}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy        # waits for postgres healthcheck to pass

  # ===========================================================================
  # STREAMLIT — dashboard, starts after ETL completes
