services:
  extract:
    build:
      context: ./extract
      dockerfile: Dockerfile.extract
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # writes merged_movies.csv into data/

  transform:
    build:
      context: ./transform
      dockerfile: Dockerfile.transform
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data      # must match the volume mount path below
      - GEOCODER_AGENT=movies_in_the_park_transform
      - GEOCODER_DELAY=1.0      # seconds between geocoder calls
    volumes:
      - ./data:/app/data        # reads merged_movies.csv, writes cleaned_merged_movies_final.csv
    depends_on:
      - extract                 # extract must finish before transform starts

